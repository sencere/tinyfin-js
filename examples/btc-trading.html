<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>tinyfin-js BTC trading</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f6f8;
      color: #17202c;
      display: grid;
      place-items: center;
      min-height: 100vh;
    }
    main {
      width: min(1120px, calc(100vw - 32px));
      display: grid;
      gap: 14px;
      padding: 24px 0;
    }
    header, .controls {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 12px;
      flex-wrap: wrap;
    }
    h1 {
      font-size: 24px;
      margin: 0;
      letter-spacing: 0;
    }
    button, label {
      border: 1px solid #bac3d0;
      background: #fff;
      border-radius: 6px;
      padding: 8px 10px;
      font: inherit;
      font-size: 14px;
    }
    button {
      cursor: pointer;
    }
    input[type="file"] {
      width: 210px;
    }
    .surface {
      display: grid;
      grid-template-columns: minmax(420px, 1fr) 300px;
      gap: 14px;
      align-items: start;
    }
    .panel {
      border: 1px solid #d7dde6;
      border-radius: 8px;
      background: #fff;
      padding: 14px;
      display: grid;
      gap: 12px;
    }
    canvas {
      width: 100%;
      border: 1px solid #c7ced9;
      background: #ffffff;
    }
    #chart {
      aspect-ratio: 16 / 9;
    }
    #bars {
      aspect-ratio: 5 / 2;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      font-size: 14px;
    }
    .stat {
      border: 1px solid #e0e5ec;
      border-radius: 6px;
      padding: 8px;
      background: #fafbfc;
    }
    .stat b {
      display: block;
      color: #526070;
      font-size: 12px;
      font-weight: 650;
    }
    .notice {
      color: #526070;
      font-size: 13px;
      line-height: 1.4;
    }
    @media (max-width: 820px) {
      .surface {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>BTC 2025 trading lab</h1>
      <div class="controls">
        <button id="train">Train 1 episode</button>
        <button id="run">Run greedy test</button>
        <button id="backend">Run backend model</button>
        <button id="reset">Reset agent</button>
        <label>CSV <input id="file" type="file" accept=".csv"></label>
      </div>
    </header>
    <div class="surface">
      <section class="panel">
        <canvas id="chart" width="900" height="506"></canvas>
        <p class="notice" id="notice">Loading dataset/btc_4h.csv...</p>
      </section>
      <aside class="panel">
        <div class="stats">
          <div class="stat"><b>Rows</b><span id="rows">0</span></div>
          <div class="stat"><b>Episodes</b><span id="episodes">0</span></div>
          <div class="stat"><b>Equity</b><span id="equity">1.0000</span></div>
          <div class="stat"><b>Buy & hold</b><span id="hold">1.0000</span></div>
          <div class="stat"><b>Trades</b><span id="trades">0</span></div>
          <div class="stat"><b>Epsilon</b><span id="epsilon">1.000</span></div>
          <div class="stat"><b>Loss</b><span id="loss">0</span></div>
          <div class="stat"><b>Action</b><span id="action">-</span></div>
        </div>
        <canvas id="bars" width="500" height="200"></canvas>
        <p class="notice">Actions are hold, long, and flat. This is a toy RL simulation, not financial advice.</p>
      </aside>
    </div>
  </main>

  <script src="../tinyfin.js"></script>
  <script src="./btc-trading-model.js"></script>
  <script>
    const DATASET_URL = "../dataset/btc_4h.csv";
    const LOOKBACK = 12;
    const MAX_ROWS = 720;
    const INITIAL_EQUITY = 1;
    const FEE = 0.001;
    const actions = ["Hold", "Long", "Flat"];
    const chart = document.getElementById("chart");
    const chartCtx = chart.getContext("2d");
    const bars = document.getElementById("bars");
    const barsCtx = bars.getContext("2d");
    let candles = [];
    let agent = null;
    let backendAgent = null;
    let episodes = 0;
    let lastRun = null;

    function parseCSV(text) {
      const lines = text.trim().split(/\r?\n/);
      const headers = lines.shift().split(",").map(h => h.trim().toLowerCase());
      const index = name => headers.indexOf(name.toLowerCase());
      const ts = index("timestamp");
      const open = index("open");
      const close = index("close");
      const high = index("high");
      const low = index("low");
      const volume = index("volume");
      if (open < 0 || close < 0 || high < 0 || low < 0 || volume < 0) {
        throw new Error("CSV needs Timestamp, Open, Close, High, Low, Volume columns");
      }
      return lines.map(line => {
        const cols = line.split(",");
        return {
          time: ts >= 0 ? cols[ts] : "",
          open: Number(cols[open]),
          close: Number(cols[close]),
          high: Number(cols[high]),
          low: Number(cols[low]),
          volume: Number(cols[volume])
        };
      }).filter(row => Number.isFinite(row.close) && row.close > 0);
    }

    function createAgent() {
      return new tinyfin.DQNAgent({
        stateSize: LOOKBACK * 4 + 1,
        actionSize: 3,
        hiddenSizes: [16],
        gamma: 0.97,
        learningRate: 0.0007,
        replaySize: 12000,
        trainStart: 80,
        batchSize: 8,
        epsilon: 1,
        epsilonMin: 0.04,
        epsilonDecay: 0.992,
        targetUpdateInterval: 80,
        rng: tinyfin.createSeededRandom(2025)
      });
    }

    function createBackendAgent(model) {
      const q = new tinyfin.DQNAgent({
        stateSize: model.stateSize,
        actionSize: model.actionSize,
        hiddenSizes: [],
        epsilon: 0
      });
      q.online.layers[0].weights = model.weights.map(row => row.slice());
      q.online.layers[0].biases = new Array(model.actionSize).fill(0);
      q.updateTarget();
      return q;
    }

    function makeState(i, position) {
      const out = [];
      for (let j = i - LOOKBACK; j < i; j++) {
        const prev = candles[Math.max(0, j - 1)];
        const cur = candles[j];
        const ret = Math.log(cur.close / prev.close);
        const body = (cur.close - cur.open) / cur.open;
        const range = (cur.high - cur.low) / cur.close;
        const volume = Math.log1p(cur.volume) / 8;
        out.push(ret * 20, body * 20, range * 10, volume);
      }
      out.push(position);
      return out;
    }

    function runEpisode(learn, greedy) {
      let equity = INITIAL_EQUITY;
      let position = 0;
      let trades = 0;
      const points = [];
      const marks = [];
      agent.resetEpisode();

      for (let i = LOOKBACK; i < candles.length - 1; i++) {
        const state = makeState(i, position);
        const decision = greedy ? agent.policy(state) : null;
        const action = greedy ? decision.action : agent.act(state, learn);
        const prevPosition = position;

        if (action === 1) position = 1;
        if (action === 2) position = 0;
        if (position !== prevPosition) {
          equity *= 1 - FEE;
          trades += 1;
          marks.push({ i, action, price: candles[i].close });
        }

        const priceReturn = candles[i + 1].close / candles[i].close - 1;
        const reward = position * priceReturn - (position !== prevPosition ? FEE : 0);
        equity *= 1 + position * priceReturn;

        if (learn) {
          agent.learnFromReward(reward, makeState(i + 1, position), i === candles.length - 2);
          agent.observe(reward);
        }

        points.push({ i, equity, position, price: candles[i].close });
      }

      const finalState = makeState(candles.length - 2, position);
      return {
        equity,
        trades,
        points,
        marks,
        decision: agent.policy(finalState)
      };
    }

    function backendState(i, position) {
      const out = new Array(backendAgent.stateSize).fill(0);
      out[i * 2 + position] = 1;
      return out;
    }

    function runBackendEpisode() {
      const model = window.tinyfinBTCTradingModel;
      if (!model) {
        document.getElementById("notice").textContent = "Backend model file is missing. Run `cd backend && make train-btc`.";
        return null;
      }
      if (!candles.length) return null;
      if (candles.length !== model.rows) {
        document.getElementById("notice").textContent = "Backend model expects " + model.rows + " rows. The page currently has " + candles.length + ".";
        return null;
      }

      backendAgent = createBackendAgent(model);
      let equity = INITIAL_EQUITY;
      let position = 0;
      let trades = 0;
      const points = [];
      const marks = [];
      let decision = { action: 0, values: [0, 0, 0] };

      for (let i = model.lookback; i < candles.length - 1; i++) {
        decision = backendAgent.policy(backendState(i, position));
        const action = decision.action;
        const prevPosition = position;
        if (action === 1) position = 1;
        if (action === 2) position = 0;
        if (position !== prevPosition) {
          equity *= 1 - model.fee;
          trades += 1;
          marks.push({ i, action, price: candles[i].close });
        }
        const priceReturn = candles[i + 1].close / candles[i].close - 1;
        equity *= 1 + position * priceReturn;
        points.push({ i, equity, position, price: candles[i].close });
      }

      return {
        equity,
        trades,
        points,
        marks,
        decision,
        source: "backend"
      };
    }

    function buyAndHold() {
      if (candles.length < 2) return 1;
      return candles[candles.length - 1].close / candles[LOOKBACK].close;
    }

    function trainEpisodes(count) {
      if (!candles.length) return;
      for (let i = 0; i < count; i++) {
        runEpisode(true, false);
        episodes += 1;
      }
      lastRun = runEpisode(false, true);
      render();
    }

    function render() {
      drawChart();
      drawBars(lastRun ? lastRun.decision.values : [0, 0, 0]);
      const stats = agent.stats();
      document.getElementById("rows").textContent = candles.length;
      document.getElementById("episodes").textContent = episodes;
      document.getElementById("equity").textContent = (lastRun ? lastRun.equity : 1).toFixed(4);
      document.getElementById("hold").textContent = buyAndHold().toFixed(4);
      document.getElementById("trades").textContent = lastRun ? lastRun.trades : 0;
      document.getElementById("epsilon").textContent = stats.epsilon.toFixed(3);
      document.getElementById("loss").textContent = stats.averageLoss.toFixed(5);
      document.getElementById("action").textContent = lastRun ? actions[lastRun.decision.action] + (lastRun.source === "backend" ? " (C)" : "") : "-";
    }

    function drawChart() {
      chartCtx.clearRect(0, 0, chart.width, chart.height);
      if (!candles.length) return;
      const pad = 42;
      const w = chart.width - pad * 2;
      const h = chart.height - pad * 2;
      const prices = candles.slice(LOOKBACK).map(c => c.close);
      const equities = lastRun ? lastRun.points.map(p => p.equity) : [];
      const minPrice = Math.min.apply(null, prices);
      const maxPrice = Math.max.apply(null, prices);
      const minEq = equities.length ? Math.min.apply(null, equities) : 0.8;
      const maxEq = equities.length ? Math.max.apply(null, equities) : 1.2;
      const xFor = k => pad + k / Math.max(1, prices.length - 1) * w;
      const yPrice = p => pad + (1 - (p - minPrice) / Math.max(1, maxPrice - minPrice)) * h;
      const yEq = e => pad + (1 - (e - minEq) / Math.max(0.0001, maxEq - minEq)) * h;

      chartCtx.strokeStyle = "#d8dde5";
      chartCtx.strokeRect(pad, pad, w, h);
      drawLine(prices, xFor, yPrice, "#526070", 2);
      if (equities.length) drawLine(equities, xFor, yEq, "#1c7ed6", 2);

      if (lastRun) {
        lastRun.marks.forEach(mark => {
          const k = mark.i - LOOKBACK;
          chartCtx.fillStyle = mark.action === 1 ? "#2b8a3e" : "#c92a2a";
          chartCtx.beginPath();
          chartCtx.arc(xFor(k), yPrice(mark.price), 4, 0, Math.PI * 2);
          chartCtx.fill();
        });
      }

      chartCtx.fillStyle = "#526070";
      chartCtx.font = "13px system-ui";
      chartCtx.fillText("BTC close", pad, 22);
      chartCtx.fillStyle = "#1c7ed6";
      chartCtx.fillText("equity curve", pad + 88, 22);
    }

    function drawLine(values, xFor, yFor, color, width) {
      chartCtx.save();
      chartCtx.strokeStyle = color;
      chartCtx.lineWidth = width;
      chartCtx.beginPath();
      values.forEach((v, i) => {
        const x = xFor(i);
        const y = yFor(v);
        if (i === 0) chartCtx.moveTo(x, y);
        else chartCtx.lineTo(x, y);
      });
      chartCtx.stroke();
      chartCtx.restore();
    }

    function drawBars(values) {
      barsCtx.clearRect(0, 0, bars.width, bars.height);
      const min = Math.min.apply(null, values);
      const max = Math.max.apply(null, values);
      const barW = 90;
      values.forEach((v, i) => {
        const x = 54 + i * 145;
        const height = 130 * (v - min) / Math.max(0.0001, max - min);
        barsCtx.fillStyle = "#1c7ed6";
        barsCtx.fillRect(x, 158 - height, barW, height);
        barsCtx.fillStyle = "#17202c";
        barsCtx.font = "13px system-ui";
        barsCtx.textAlign = "center";
        barsCtx.fillText(actions[i], x + barW / 2, 182);
        barsCtx.fillText(v.toFixed(5), x + barW / 2, 28);
      });
    }

    async function loadDefaultDataset() {
      try {
        const response = await fetch(DATASET_URL);
        if (!response.ok) throw new Error("HTTP " + response.status);
        loadText(await response.text(), DATASET_URL);
      } catch (err) {
        document.getElementById("notice").textContent = "Could not auto-load CSV. Use the file picker, or serve this folder with a local HTTP server.";
      }
    }

    function loadText(text, label) {
      candles = parseCSV(text).slice(-MAX_ROWS);
      agent = createAgent();
      backendAgent = null;
      episodes = 0;
      lastRun = runEpisode(false, true);
      document.getElementById("notice").textContent = "Loaded " + label + ". Train the browser agent or run the backend model.";
      render();
    }

    document.getElementById("train").addEventListener("click", () => trainEpisodes(1));
    document.getElementById("run").addEventListener("click", () => {
      if (!candles.length) return;
      lastRun = runEpisode(false, true);
      render();
    });
    document.getElementById("backend").addEventListener("click", () => {
      const result = runBackendEpisode();
      if (!result) return;
      lastRun = result;
      document.getElementById("notice").textContent = "Ran C backend model from examples/btc-trading-model.js.";
      render();
    });
    document.getElementById("reset").addEventListener("click", () => {
      if (!candles.length) return;
      agent = createAgent();
      backendAgent = null;
      episodes = 0;
      lastRun = runEpisode(false, true);
      render();
    });
    document.getElementById("file").addEventListener("change", event => {
      const file = event.target.files[0];
      if (!file) return;
      file.text().then(text => loadText(text, file.name)).catch(err => {
        document.getElementById("notice").textContent = err.message;
      });
    });

    agent = createAgent();
    render();
    loadDefaultDataset();
  </script>
</body>
</html>
